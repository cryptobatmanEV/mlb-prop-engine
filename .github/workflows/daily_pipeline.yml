name: Daily Pipeline

# Runs five times per day during baseball season:
#    1 AM ET ( 6:00 UTC) — log-results-only run (no predictions; gives the
#                          prior evening's late games time to finalize)
#    9 AM ET (14:00 UTC) — full pipeline, after overnight lineups post
#   11 AM ET (16:00 UTC) — full pipeline, refresh with confirmed lineups
#    3 PM ET (20:00 UTC) — full pipeline, afternoon/evening lineups confirmed
#    5 PM ET (22:00 UTC) — full pipeline, late lineup changes

on:
  schedule:
    - cron: '0 6 * * *'    #  1:00 AM ET (6:00 UTC)  — log results ONLY
    - cron: '0 14 * * *'   #  9:00 AM ET (14:00 UTC) — full pipeline
    - cron: '0 16 * * *'   # 11:00 AM ET (16:00 UTC) — full pipeline
    - cron: '0 20 * * *'   #  3:00 PM ET (20:00 UTC) — full pipeline
    - cron: '0 22 * * *'   #  5:00 PM ET (22:00 UTC) — full pipeline
  workflow_dispatch:         # manual trigger from the Actions tab

permissions:
  contents: write   # needed to commit outputs back to the repo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Log yesterday's actual HR results into Neon.
      # Reads yesterday's fair_odds CSV (committed by the previous pipeline run).
      # Uses continue-on-error so a missing CSV on the very first run doesn't block predictions.
      - name: Log yesterday's results
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/log_results.py

      # Generate today's predictions and write to Neon (powers the web app).
      # Skipped on the 1 AM ET (6:00 UTC) run, which only logs results.
      - name: Generate today's predictions
        if: github.event.schedule != '0 6 * * *'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/daily_pipeline.py

      # Commit the new fair_odds CSV and any results_log updates back to the repo.
      # This is what makes tomorrow's log_results step able to read today's CSV.
      - name: Commit pipeline outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/outputs/ data/logs/ data/processed/vs_pitcher_cache.json 2>/dev/null || true
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Auto: pipeline $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
