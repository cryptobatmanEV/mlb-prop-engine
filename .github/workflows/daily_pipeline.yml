name: Daily Pipeline

# Runs five times per day during baseball season:
#    9 AM EDT (13:00 UTC) — log-results-only run (no predictions; gives the
#                           prior evening's late games time to finalize)
#   11 AM EDT (15:00 UTC) — full pipeline, after overnight lineups post
#    2 PM EDT (18:00 UTC) — full pipeline, refresh with confirmed lineups
#    5 PM EDT (21:00 UTC) — full pipeline, afternoon/evening lineups confirmed
#    8 PM EDT (00:00 UTC) — full pipeline, late lineup changes
# All times assume EDT (UTC-4, April-October). No adjustment needed in off-season.

on:
  schedule:
    - cron: '0 13 * * *'   #  9:00 AM EDT — log results only
    - cron: '0 15 * * *'   # 11:00 AM EDT — full pipeline
    - cron: '0 18 * * *'   #  2:00 PM EDT — full pipeline
    - cron: '0 21 * * *'   #  5:00 PM EDT — full pipeline
    - cron: '0 0 * * *'    #  8:00 PM EDT — full pipeline
  workflow_dispatch:         # manual trigger from the Actions tab

permissions:
  contents: write   # needed to commit outputs back to the repo

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Log yesterday's actual HR results into Neon.
      # Reads yesterday's fair_odds CSV (committed by the previous pipeline run).
      # Uses continue-on-error so a missing CSV on the very first run doesn't block predictions.
      - name: Log yesterday's results
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/log_results.py

      # Generate today's predictions and write to Neon (powers the web app).
      # Skipped on the 9 AM EDT (13:00 UTC) run, which only logs results.
      - name: Generate today's predictions
        if: github.event.schedule != '0 13 * * *'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/daily_pipeline.py

      # Commit the new fair_odds CSV and any results_log updates back to the repo.
      # This is what makes tomorrow's log_results step able to read today's CSV.
      - name: Commit pipeline outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/outputs/ data/logs/ data/processed/vs_pitcher_cache.json 2>/dev/null || true
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Auto: pipeline $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
