name: Daily Pipeline

# Runs eight times per day during baseball season:
#    6 AM ET (10:00 UTC) — log-results-only run (no predictions; gives the
#                          prior evening's late games time to finalize)
#    8 AM ET (12:00 UTC) — full pipeline, early overnight lineups
#   10 AM ET (14:00 UTC) — full pipeline, after overnight lineups post
#   11 AM ET (15:00 UTC) — full pipeline, refresh with confirmed lineups
#    1 PM ET (17:00 UTC) — full pipeline, afternoon lineups confirmed
#    2 PM ET (18:00 UTC) — full pipeline, afternoon/evening lineups confirmed
#    4 PM ET (20:00 UTC) — full pipeline, late afternoon lineups
#    6 PM ET (22:00 UTC) — full pipeline, late lineup changes

on:
  schedule:
    - cron: '0 10 * * *'   #  6:00 AM ET (10:00 UTC) — log results ONLY
    - cron: '0 12 * * *'   #  8:00 AM ET (12:00 UTC) — full pipeline
    - cron: '0 14 * * *'   # 10:00 AM ET (14:00 UTC) — full pipeline
    - cron: '0 15 * * *'   # 11:00 AM ET (15:00 UTC) — full pipeline
    - cron: '0 17 * * *'   #  1:00 PM ET (17:00 UTC) — full pipeline
    - cron: '0 18 * * *'   #  2:00 PM ET (18:00 UTC) — full pipeline
    - cron: '0 20 * * *'   #  4:00 PM ET (20:00 UTC) — full pipeline
    - cron: '0 22 * * *'   #  6:00 PM ET (22:00 UTC) — full pipeline
  workflow_dispatch:         # manual trigger from the Actions tab

permissions:
  contents: write   # needed to commit outputs back to the repo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Refresh the raw Statcast store and the rolling feature parquets that
      # predict/batter_props_runner.py (Hits/Total Bases/Batter Ks) actually
      # reads. Without this, update_statcast.py's fetch only ever lived in
      # the ephemeral runner filesystem for that one run -- the store and
      # every feature file stayed frozen at whatever was last manually
      # committed, no matter how many times this workflow ran per day.
      #
      # Runs ONLY on the first full-pipeline trigger of the day (8 AM ET).
      # Each feature script re-aggregates full history (300K+ rows) with a
      # groupby+rolling pass -- ~2 min locally with a warm pybaseball cache,
      # meaningfully more on a cold CI runner. Running that 7x/day (once per
      # full-pipeline trigger) roughly 7x'd this workflow's compute for no
      # real benefit, since new completed games mostly land overnight
      # between days, not multiple times within the same day -- that's the
      # leading suspect for the pipeline failing across every run on 7/19.
      # continue-on-error: true matches daily_pipeline.py's own "non-fatal"
      # treatment of the Statcast update -- predictions should still run off
      # yesterday's features rather than block entirely on a fetch hiccup.
      - name: Update Statcast data and rebuild batter-props features
        if: github.event.schedule == '0 12 * * *'
        continue-on-error: true
        timeout-minutes: 15
        run: |
          python ingestion/update_statcast.py
          python features/batter_pa_features.py
          python features/pitcher_pa_features.py
          python features/pitcher_game_log_features.py
          python features/batter_platoon_pa_features.py

      # Log yesterday's actual results into Neon for all 4 models (HR, Hits,
      # Total Bases, Batter Ks). Reads yesterday's fair_odds CSVs (committed
      # by the previous pipeline run). Uses continue-on-error so a missing
      # CSV on the very first run doesn't block predictions.
      - name: Log yesterday's results (all models)
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/daily_pipeline.py --log-only

      # Generate today's predictions and write to Neon (powers the web app).
      # Skipped on the 1 AM ET (6:00 UTC) run, which only logs results.
      - name: Generate today's predictions
        if: github.event.schedule != '0 10 * * *'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PARLAY_API_KEY: ${{ secrets.PARLAY_API_KEY }}
          ODDS_PROVIDER: parlay_api
        run: python scripts/daily_pipeline.py

      # Commit the new fair_odds CSV, results_log updates, and the refreshed
      # Statcast store/feature parquets back to the repo. This is what makes
      # tomorrow's log_results step (and every later run's feature rebuild)
      # actually start from today's data instead of resetting to whatever
      # was last committed.
      - name: Commit pipeline outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/outputs/ data/logs/ data/processed/vs_pitcher_cache.json \
                  data/raw/statcast_batted_balls.parquet \
                  data/processed/batter_pa_features.parquet \
                  data/processed/pitcher_pa_features.parquet \
                  data/processed/pitcher_game_log_features.parquet \
                  data/processed/batter_platoon_pa_features.parquet \
                  2>/dev/null || true
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Auto: pipeline $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            git push && break
            echo "Push rejected (attempt $i/5) -- rebasing onto origin/main and retrying..."
            git fetch origin main
            git rebase origin/main
          done
