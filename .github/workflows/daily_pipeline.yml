name: Daily Pipeline

# Runs eight times per day during baseball season:
#    6 AM ET (10:00 UTC) — log-results-only run (no predictions; gives the
#                          prior evening's late games time to finalize)
#    8 AM ET (12:00 UTC) — full pipeline, early overnight lineups
#   10 AM ET (14:00 UTC) — full pipeline, after overnight lineups post
#   11 AM ET (15:00 UTC) — full pipeline, refresh with confirmed lineups
#    1 PM ET (17:00 UTC) — full pipeline, afternoon lineups confirmed
#    2 PM ET (18:00 UTC) — full pipeline, afternoon/evening lineups confirmed
#    4 PM ET (20:00 UTC) — full pipeline, late afternoon lineups
#    6 PM ET (22:00 UTC) — full pipeline, late lineup changes

on:
  schedule:
    - cron: '0 10 * * *'   #  6:00 AM ET (10:00 UTC) — log results ONLY
    - cron: '0 12 * * *'   #  8:00 AM ET (12:00 UTC) — full pipeline
    - cron: '0 14 * * *'   # 10:00 AM ET (14:00 UTC) — full pipeline
    - cron: '0 15 * * *'   # 11:00 AM ET (15:00 UTC) — full pipeline
    - cron: '0 17 * * *'   #  1:00 PM ET (17:00 UTC) — full pipeline
    - cron: '0 18 * * *'   #  2:00 PM ET (18:00 UTC) — full pipeline
    - cron: '0 20 * * *'   #  4:00 PM ET (20:00 UTC) — full pipeline
    - cron: '0 22 * * *'   #  6:00 PM ET (22:00 UTC) — full pipeline
  workflow_dispatch:         # manual trigger from the Actions tab

permissions:
  contents: write   # needed to commit outputs back to the repo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Log yesterday's actual HR results into Neon.
      # Reads yesterday's fair_odds CSV (committed by the previous pipeline run).
      # Uses continue-on-error so a missing CSV on the very first run doesn't block predictions.
      - name: Log yesterday's results
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/log_results.py

      # Generate today's predictions and write to Neon (powers the web app).
      # Skipped on the 1 AM ET (6:00 UTC) run, which only logs results.
      - name: Generate today's predictions
        if: github.event.schedule != '0 10 * * *'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PARLAY_API_KEY: ${{ secrets.PARLAY_API_KEY }}
          ODDS_PROVIDER: parlay_api
        run: python scripts/daily_pipeline.py

      # Commit the new fair_odds CSV and any results_log updates back to the repo.
      # This is what makes tomorrow's log_results step able to read today's CSV.
      - name: Commit pipeline outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/outputs/ data/logs/ data/processed/vs_pitcher_cache.json 2>/dev/null || true
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Auto: pipeline $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
